<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>StockPulse — Create Account</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
    <link rel="stylesheet" th:href="@{/css/auth.css}"/>
</head>
<body class="auth-body">

<div class="auth-split">
    <div class="auth-brand">
        <div class="brand-content">
            <div class="brand-logo">
                <span class="logo-icon-lg">⬡</span>
                <span class="logo-text-lg">StockPulse</span>
            </div>
            <h2 class="brand-headline">Start your<br/>trading journey<br/>today.</h2>
            <p class="brand-sub">Get $100,000 virtual capital and start trading immediately with AI-powered insights.</p>
            <div class="brand-stats">
                <div class="brand-stat"><span class="stat-num">Free</span><span class="stat-label">No Credit Card</span></div>
                <div class="brand-stat"><span class="stat-num">$100K</span><span class="stat-label">Virtual Capital</span></div>
                <div class="brand-stat"><span class="stat-num">Live</span><span class="stat-label">Market Data</span></div>
            </div>
        </div>
    </div>

    <div class="auth-form-side">
        <div class="auth-card">
            <h1 class="auth-title">Create account</h1>
            <p class="auth-sub">Join thousands of virtual traders</p>

            <div th:if="${error}" class="alert alert-error" th:text="${error}">Error</div>

            <form th:action="@{/register}" method="post" class="auth-form">
                <div class="auth-field">
                    <label class="auth-label">Full Name</label>
                    <input type="text" name="fullName" class="auth-input" placeholder="John Doe" required/>
                </div>
                <div class="auth-field">
                    <label class="auth-label">Username</label>
                    <input type="text" name="username" class="auth-input" placeholder="johndoe" required/>
                </div>
                <div class="auth-field">
                    <label class="auth-label">Email</label>
                    <input type="email" name="email" class="auth-input" placeholder="john@example.com" required/>
                </div>
                <div class="auth-field">
                    <label class="auth-label">Password</label>
                    <input type="password" name="password" class="auth-input" placeholder="At least 6 characters" minlength="6" required/>
                </div>
                <button type="submit" class="auth-btn">Create Account →</button>
            </form>

            <p class="auth-switch">Already have an account? <a th:href="@{/login}">Sign in</a></p>
        </div>
    </div>
</div>

</body>
</html>
