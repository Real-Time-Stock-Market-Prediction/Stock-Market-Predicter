# ============================================
# Stock Market Prediction App - Configuration
# ============================================

spring.application.name=stock-prediction-app

# ---- Database Configuration (MySQL) ----
# Replacing credentials before production use
spring.datasource.url=jdbc:mysql://localhost:3306/stockmarket_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:yourpassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- H2 In-Memory DB (for quick dev/demo without MySQL) ----
# Uncomment these lines and comment out MySQL config above to use H2
# spring.datasource.url=jdbc:h2:mem:stockmarketdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---- H2 Console (Dev Only) ----
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---- Thymeleaf ----
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ---- Server ----
server.port=8080
server.servlet.context-path=/

# ---- Stock API Keys ----
# Store keys securely using environment variables
stock.api.finnhub.key=${FINNHUB_API_KEY:YOUR_FINNHUB_API_KEY}
stock.api.alphavantage.key=${ALPHA_VANTAGE_API_KEY:YOUR_ALPHA_VANTAGE_API_KEY}

# ---- WebSocket ----
spring.websocket.max-text-message-size=8192

# ---- Scheduled Tasks ----
# Refresh interval in milliseconds (10 seconds)
stock.refresh.interval=10000

# ---- Cache ----
spring.cache.type=simple

# ---- Logging ----
logging.level.com.stockmarket=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=ERROR

# ---- Yahoo Finance via RapidAPI ----
stock.api.yahoo.enabled=true
