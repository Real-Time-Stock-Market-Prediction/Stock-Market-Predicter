<!-- ========================================= -->
<!-- StockPulse - Live Market Simulation App -->
<!-- This file contains HTML, CSS, JavaScript -->
<!-- ========================================= -->

<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Responsive Design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Website Title -->
    <title>StockPulse - Live Market</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <!-- Chart.js Library for Graph -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

    <!-- CSS Styling Start -->
    <style>

        /* Root Colors and Variables */
        :root{
            --bg0:#04060f;
            --text1:#ffffff;
            --accent:#4f8cff;
            --green:#00e5a0;
            --red:#ff4566;
        }

        /* Body Styling */
        body{
            margin:0;
            padding:0;
            font-family:Arial;
            background:var(--bg0);
            color:var(--text1);
        }

        /* Sidebar Styling */
        .sidebar{
            width:220px;
            height:100vh;
            background:#080d1c;
            position:fixed;
            left:0;
            top:0;
        }

        /* Main Content Area */
        .main{
            margin-left:220px;
            padding:20px;
        }

        /* Button Style */
        button{
            padding:10px;
            cursor:pointer;
        }

        /* Card Design */
        .card{
            background:#111d35;
            padding:20px;
            border-radius:10px;
            margin-bottom:20px;
        }

    </style>
</head>

<body>

<!-- ========================= -->
<!-- Sidebar Section -->
<!-- ========================= -->
<div class="sidebar">

    <h2>StockPulse</h2>

    <!-- Navigation Buttons -->
    <button onclick="showPage('dashboard')">Dashboard</button>
    <button onclick="showPage('market')">Market</button>
    <button onclick="showPage('portfolio')">Portfolio</button>

</div>

<!-- ========================= -->
<!-- Main Section -->
<!-- ========================= -->
<div class="main">

    <!-- Dashboard Page -->
    <div class="card" id="dashboard">
        <h2>Dashboard</h2>
        <p>Live Stock Dashboard Data</p>
    </div>

    <!-- Market Page -->
    <div class="card" id="market" style="display:none;">
        <h2>Live Market</h2>
        <p>All stock prices shown here.</p>
    </div>

    <!-- Portfolio Page -->
    <div class="card" id="portfolio" style="display:none;">
        <h2>Portfolio</h2>
        <p>Your holdings shown here.</p>
    </div>

    <!-- Canvas Chart -->
    <canvas id="stockChart"></canvas>

</div>

<!-- ========================= -->
<!-- JavaScript Start -->
<!-- ========================= -->
<script>

    // Function to change pages
    function showPage(page){

        // Hide all pages
        document.getElementById("dashboard").style.display="none";
        document.getElementById("market").style.display="none";
        document.getElementById("portfolio").style.display="none";

        // Show selected page
        document.getElementById(page).style.display="block";
    }

    // Chart Creation
    const ctx = document.getElementById("stockChart");

    const myChart = new Chart(ctx, {
        type: "line",

        data: {
            labels:["Mon","Tue","Wed","Thu","Fri"],
            datasets:[{
                label:"Stock Price",
                data:[100,120,110,140,150],
                borderColor:"#4f8cff",
                borderWidth:2
            }]
        },

        options:{
            responsive:true
        }

    });

</script>

</body>
</html>
